  <text x="68" y="283" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#333">Quote signed by Phala dstack</text>
  <text x="68" y="301" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#57606a">app_id 915c8197... · TCB measurements valid</text>

