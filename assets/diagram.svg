<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="A CVM hosts many apps; one app's attestation package goes to a counterparty who reads the source code and verifies the TEE quote.">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1f6feb"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="300" height="260" rx="12" fill="#f7f9fc" stroke="#1f6feb" stroke-width="2"/>
  <text x="170" y="46" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#111">Your CVM</text>
  <text x="170" y="64" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#666">tee-daemon on Phala dstack</text>

  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#333">
    <rect x="40" y="85" width="80" height="50" rx="6" fill="#fff" stroke="#c9d3e0"/>
    <text x="80" y="115" text-anchor="middle">notes</text>

    <rect x="130" y="85" width="80" height="50" rx="6" fill="#fff" stroke="#1f6feb" stroke-width="2"/>
    <text x="170" y="107" text-anchor="middle" font-weight="600">prompt</text>
    <text x="170" y="123" text-anchor="middle" font-weight="600">receipt</text>

    <rect x="220" y="85" width="80" height="50" rx="6" fill="#fff" stroke="#c9d3e0"/>
    <text x="260" y="115" text-anchor="middle">feed</text>

    <rect x="40" y="155" width="80" height="50" rx="6" fill="#fff" stroke="#c9d3e0"/>
    <text x="80" y="185" text-anchor="middle">tunnel</text>

    <rect x="130" y="155" width="80" height="50" rx="6" fill="#fff" stroke="#c9d3e0"/>
    <text x="170" y="185" text-anchor="middle">timelock</text>

    <rect x="220" y="155" width="80" height="50" rx="6" fill="#fff" stroke="#c9d3e0"/>
    <text x="260" y="185" text-anchor="middle">…</text>
  </g>

  <text x="170" y="235" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#666">most apps stay private</text>
  <text x="170" y="252" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#666">you pick one to share</text>

  <path d="M 210 110 C 320 110, 340 150, 380 150" stroke="#1f6feb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="380" y="85" width="200" height="130" rx="8" fill="#fffbe6" stroke="#bf8700" stroke-width="1.5"/>
  <text x="480" y="110" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#111">attestation package</text>
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#333">
    <text x="395" y="135">• source code</text>
    <text x="395" y="155">• outputs</text>
    <text x="395" y="175">• TEE quote (signed)</text>
  </g>
  <text x="480" y="200" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#666">private inputs and keys stripped</text>

  <path d="M 580 150 H 638" stroke="#1f6feb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="640" y="85" width="240" height="130" rx="8" fill="#f0f7f4" stroke="#1a7f37" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#111">counterparty</text>
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#333">
    <text x="660" y="145">• reads the source code</text>
    <text x="660" y="165">• verifies the TEE quote</text>
    <text x="660" y="185">• decides what to make of it</text>
  </g>
</svg>
